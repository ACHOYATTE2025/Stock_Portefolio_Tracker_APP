server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/stockportefoliotracker/v1/ {
        proxy_pass https://stock-portfolio-tracker-app-backend.onrender.com/api/stockportefoliotracker/v1/;
        proxy_set_header Host stock-portfolio-tracker-app-backend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}